<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <!-- 🔍 検索エンジンに読ませるSEOタグ -->
 <meta name="google-site-verification" content="2X7BdbUJJ80hW3" />

  <title>読点・句点変換ツール｜文章を自動で整形する無料サイト</title>
  <meta name="description" content="文章中の「、」を「,」、「。」を「.」に自動変換する無料ツールです。コピペするだけで簡単に整形できます。">
  <meta name="keywords" content="読点変換, 句点変換, 文章整形, 自動変換, 日本語ツール, ライティング補助">

  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #f9f9f9;
    }
    textarea {
      width: 100%;
      height: 300px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 20px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #7fbfff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
  </style>

</head>
<body>

<!-- 🔍 検索エンジンが最も重視する見出し -->
<h1>読点・句点変換ツール（無料）</h1>

<textarea id="input" placeholder="ここに文章を入力"></textarea>
<button onclick="convert()">変換する</button>
<textarea id="output" placeholder="変換結果"></textarea>

<script>
function convert() {
  const text = document.getElementById("input").value;
  const converted = text
    .replace(/、/g, ",")
    .replace(/。/g, ".");
  document.getElementById("output").value = converted;
}
</script>

</body>
</html>
